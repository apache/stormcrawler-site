# https://cwiki.apache.org/confluence/display/INFRA/Git+-+.asf.yaml+features

notifications:
  commits: commits@stormcrawler.apache.org
  issues: dev@stormcrawler.apache.org
  pullrequests: dev@stormcrawler.apache.org

publish:
  whoami: asf-site

github:
  description: "Source for the Apache StormCrawler web site"
  homepage: https://stormcrawler.apache.org/
  labels:
    - website
    - jekyll
  features:
    # Enable wiki for documentation
    wiki: false
    # Enable issue management
    issues: true
    # Enable projects for project management boards
    projects: false

  rulesets:
    - name: "Default Branch Protection"
      type: branch
      branches:
        includes:
          - "~DEFAULT_BRANCH"
          - "release/*"
          - "rel/*"
        excludes: []
      bypass_teams:
        - root
      restrict_deletion: true
      restrict_force_push: true
